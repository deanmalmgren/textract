---
name: Setup Action
description: Configure Python with uv and install package dependencies

inputs:
  python-version:
    description: Python version
    required: true

runs:
  using: composite
  steps:
    - name: Install cached system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: tesseract-ocr sox libsox-fmt-mp3 ghostscript unrtf poppler-utils
        version: 1.1

    - name: Install LibreOffice (Ubuntu)
      if: runner.os == 'Linux'
      shell: bash
      # LibreOffice is installed directly rather than through cache-apt-pkgs-action:
      # that action restores package files without re-running the dpkg postinst
      # triggers (fontconfig cache, mime database, ldconfig), which leaves
      # soffice --headless aborting intermittently on cache-hit runs with a
      # com::sun::star::uno::RuntimeException ("Unspecified Application Error").
      run: |
        sudo apt-get update
        sudo apt-get install -y libreoffice dbus-x11

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install tesseract sox lame mad ghostscript unrtf poppler
        brew install --cask libreoffice

    - name: Install system dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        # ghostscript choco install intermittently hangs/"access is denied" on GH Windows
        # runners: https://github.com/actions/runner-images/issues/11808
        $maxAttempts = 3
        for ($attempt = 1; $attempt -le $maxAttempts; $attempt++) {
            choco install make tesseract ghostscript sox.portable poppler libreoffice-fresh -y --no-progress --execution-timeout=600
            if ($LASTEXITCODE -eq 0) { break }
            if ($attempt -eq $maxAttempts) {
                throw "choco install failed after $maxAttempts attempts (exit code $LASTEXITCODE)"
            }
            Write-Host "choco install failed (exit code $LASTEXITCODE), retrying ($attempt/$maxAttempts)..."
            Start-Sleep -Seconds 15
        }
        # Add tesseract installation directory to PATH
        Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Tesseract-OCR"
        # For ghostscript, the version number is in the path, so find it dynamically
        $gsBin = Get-ChildItem "C:\Program Files\gs" -Directory |
            Sort-Object Name |
            Select-Object -Last 1 -ExpandProperty FullName
        Add-Content -Path $env:GITHUB_PATH -Value "$gsBin\bin"
        # Add poppler to PATH — find pdftoppm.exe dynamically
        $popplerBin = Get-ChildItem "C:\tools" -Recurse -Filter "pdftoppm.exe" -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty DirectoryName
        Add-Content -Path $env:GITHUB_PATH -Value $popplerBin
        # Add LibreOffice (soffice.exe) to PATH for the .doc parser
        Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\LibreOffice\program"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ inputs.python-version }}

    - name: Install Project Dependencies
      run: make sync
      shell: bash
