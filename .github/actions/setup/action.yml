---
name: Setup Action
description: Configure Python with uv and install package dependencies

inputs:
  python-version:
    description: Python version
    required: true

runs:
  using: composite
  steps:
    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      uses: awalsh128/cache-apt-pkgs-action@v1
      with:
        packages: antiword tesseract-ocr sox libsox-fmt-mp3 ghostscript unrtf poppler-utils
        version: 1.1

    - name: Install system dependencies (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: |
        brew install antiword tesseract sox lame mad ghostscript unrtf poppler

    - name: Install system dependencies (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        choco install tesseract ghostscript sox.portable poppler -y
        # tesseract not shimmed by choco — https://community.chocolatey.org/packages/tesseract
        Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files\Tesseract-OCR"
        # ghostscript bin not added to PATH (chocolatey-community/chocolatey-coreteampackages#1330)
        # https://community.chocolatey.org/packages/ghostscript
        # version number is in the path, so find it dynamically
        $gsBin = Get-ChildItem "C:\Program Files\gs" -Directory |
            Sort-Object Name |
            Select-Object -Last 1 -ExpandProperty FullName
        Add-Content -Path $env:GITHUB_PATH -Value "$gsBin\bin"
        # ps2ascii is a Unix wrapper around ghostscript — create a cmd equivalent
        $wrapperDir = "C:\tools\wrappers"
        New-Item -ItemType Directory -Path $wrapperDir -Force | Out-Null
        $wrapper = "@echo off`r`ngswin64c.exe -q -dNODISPLAY -dBATCH -dNOPAUSE -sDEVICE=txtwrite -sOutputFile=- %1`r`n"
        [System.IO.File]::WriteAllText("$wrapperDir\ps2ascii.cmd", $wrapper)
        Add-Content -Path $env:GITHUB_PATH -Value $wrapperDir

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ inputs.python-version }}

    - name: Install Project Dependencies
      run: uv sync --all-extras
      shell: bash
