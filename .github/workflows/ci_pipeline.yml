---
name: CI Pipeline

"on":
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    paths:
      - .github/workflows/ci_pipeline.yml
      - textract/**
      - tests/**
      - uv.lock
      - pyproject.toml

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        python-version: ["3.9", "3.14"]
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        id: tests
        run: uv run pytest --junit-xml=test-results.xml
        env:
          SKIP_NETWORK_TESTS: "true"

      - name: Debug HTML tests (Windows xfail visibility)
        if: runner.os == 'Windows'
        run: uv run pytest tests/test_html.py --runxfail
        continue-on-error: true
        env:
          SKIP_NETWORK_TESTS: "true"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-py${{ matrix.python-version }}
          path: test-results.xml

  release:
    name: Create GitHub Release
    needs: [test]
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - name: Generate release notes
        run: uv run cz changelog --incremental --file-name body.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: body.md
          tag_name: ${{ github.ref_name }}

  publish:
    name: Publish to PyPI
    needs: [test]
    if: github.event_name == 'push' && startsWith(github.event.ref, 'refs/tags')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/textract
    permissions:
      id-token: write  # IMPORTANT: mandatory for PyPI trusted publishing
    steps:
      - uses: actions/checkout@v6
      - name: Install uv and Python
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - name: Build Package
        run: uv build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
